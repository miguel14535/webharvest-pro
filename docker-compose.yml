services:
  postgres:
    image: postgres:16
    container_name: webharvest_postgres
    environment:
      POSTGRES_USER: webharvest
      POSTGRES_PASSWORD: webharvest
      POSTGRES_DB: webharvest_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: webharvest_redis
    ports:
      - "6379:6379"